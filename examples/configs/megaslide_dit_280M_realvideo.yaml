# MegaSlide-DiT ~280M params on real-video VAE latents (Phase 1)
#
# Data: 207 clips from Disney-VideoGeneration-Dataset, encoded through
#   stabilityai/sd-vae-ft-mse -> [4, 16, 32, 32] latents.
# 176 train / 31 val.
#
# Model: 22 layers, 1024 hidden, 16 heads -> ~286M params.
# Matches the 120M-class Phase 3 experiment but at ~2.4x scale and on
# real video data instead of synthetic motion patterns.

model:
  frames: 16
  in_channels: 4
  height: 32
  width: 32
  patch_size: 4
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  mlp_ratio: 4.0
  dsa_kernel_size: [3, 5, 5]
  offset_scale: 1.0
  dropout: 0.0
  dtype: "bfloat16"
  device: 0

dataset:
  path: "data/real_video_latents/train_latents.pt"
  latent_layout: "auto"

training:
  batch_size: 1
  num_steps: 1000
  learning_rate: 3.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  diffusion_steps: 1000

memory:
  checkpoint_interval: 2
  num_grad_slabs: 4

logging:
  log_interval: 10
  save_interval: 500
