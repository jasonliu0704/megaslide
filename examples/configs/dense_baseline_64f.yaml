# Dense 3D-DiT Baseline Configuration (Paper Section 5.2)
# Global attention baseline - maximum 64 frames before OOM

model:
  frames: 64  # Maximum for Dense baseline (OOMs at 256)
  in_channels: 4
  height: 1080
  width: 1920
  patch_size: 16
  hidden_size: 8192
  num_layers: 48
  num_heads: 64
  mlp_ratio: 4.0
  dropout: 0.0
  dtype: "bfloat16"

dataset:
  path: ""  # Uses synthetic data if empty
  synthetic_samples: 100
  latent_layout: "auto"

training:
  batch_size: 1
  gradient_accumulation_steps: 1
  num_steps: 5000
  learning_rate: 1.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42

optimizer:
  optimizer: "cpu_adamw"
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

memory:
  checkpoint_interval: 4
  num_grad_slabs: 12
  device: 0
  force_cpu: false

logging:
  log_interval: 10
  save_interval: 1000
